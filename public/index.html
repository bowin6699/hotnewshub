<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热点新闻聚合站 - HotNewsHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

  <!-- Hero Section -->
  <header class="hero" id="hero">
    <video class="hero-bg" autoplay muted loop playsinline>
      <source src="images/hero-bg.mp4?v=5" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <nav class="hero-nav">
      <div class="nav-inner">
        <span class="nav-brand">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          HotNewsHub
        </span>
        <div class="nav-right">
          <span class="nav-stats" id="visitStats">-- 访问</span>
          <button id="refreshBtn" class="nav-refresh" title="刷新">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
          </button>
        </div>
      </div>
    </nav>
    <div class="hero-content">
      <h1 class="hero-title">热点新闻聚合站</h1>
      <p class="hero-subtitle">汇集10大平台热点资讯 · 智能聚合 · 每半小时更新</p>
      <p class="hero-byline">By：Bowin&nbsp;&nbsp;&nbsp;服务每一个致力于分享热点的作者</p>
      <p class="hero-email">有任何意见和建议请发送邮件到 bowin6699@126.com</p>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-inner">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索新闻标题..." autocomplete="off">
        <button id="clearSearch" class="clear-btn" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-stats">
        <span id="totalCount">共 0 条</span>
        <span class="stat-dot">·</span>
        <span id="filteredCount">已筛选 0</span>
      </div>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="tabs-wrapper">
    <div class="category-tabs" id="categoryTabs">
      <button class="category-tab" data-source="guancha" style="--tab-bg:#e60012;">
        观察者网
      </button>
      <button class="category-tab" data-source="wangyi" style="--tab-bg:#1d87c5;">
        网易新闻
      </button>
      <button class="category-tab" data-source="tencent" style="--tab-bg:#df2d32;">
        腾讯新闻
      </button>
      <button class="category-tab" data-source="sohu" style="--tab-bg:#ff7a00;">
        搜狐新闻
      </button>
      <button class="category-tab" data-source="sina" style="--tab-bg:#e6162d;">
        新浪新闻
      </button>
      <button class="category-tab" data-source="mysdc" style="--tab-bg:#3366ff;">
        驱动之家
      </button>
      <button class="category-tab" data-source="pingwest" style="--tab-bg:#e4007f;">
        品玩
      </button>
      <button class="category-tab" data-source="ithome" style="--tab-bg:#2c3e50;">
        IT之家
      </button>
      <button class="category-tab" data-source="huxiu" style="--tab-bg:#e74c3c;">
        虎嗅
      </button>
      <button class="category-tab active" data-source="thepaper" style="--tab-bg:#185b53;">
        澎湃新闻
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- News List -->
    <div class="news-list" id="newsList"></div>

    <!-- Loading -->
    <div class="loading" id="loading" style="display:none;">
      <div class="spinner-ring"><div></div><div></div><div></div><div></div></div>
      <p>正在加载新闻...</p>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1" opacity="0.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p>暂无相关新闻</p>
      <p class="empty-hint">尝试切换分类或筛选条件</p>
    </div>

    <!-- Load More -->
    <div class="load-more-wrapper" id="loadMoreContainer" style="display:none;">
      <button id="loadMoreBtn" class="load-more-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        加载更多
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        HotNewsHub
      </div>
      <p>数据来源于各大开放平台 | 每半小时自动更新</p>
    </div>
  </footer>

  <script src="app.js?v=3"></script>
</body>
</html>
